[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-c6-mini-1-n4
framework = arduino
monitor_speed = 500000

board_build.filesystem = littlefs
board_build.partitions = src/partitions_4mb.csv

build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    ; Optimized stack sizes
    #-D CONFIG_ASYNC_TCP_STACK_SIZE=6144
    #-D CONFIG_LWIP_TCPIP_TASK_STACK_SIZE=3072
    #-D CONFIG_ESP_MAIN_TASK_STACK_SIZE=6144
    
     # Network optimization
    -D CONFIG_LWIP_MAX_SOCKETS=8
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=0
    -D CONFIG_ASYNC_TCP_USE_WDT=0
    
lib_deps = 
    # Lightweight web server
    mathieucarbou/AsyncTCP@^3.1.4
    mathieucarbou/ESP Async WebServer@^3.0.6
    bblanchon/ArduinoJson@^7.0.0
    
    # Existing dependencies
    https://github.com/Freenove/Freenove_WS2812_Lib_for_ESP32
    https://github.com/rwmingis/InterruptButton
    https://github.com/vortigont/ESPAsyncButton

lib_ignore = 
    AsyncTCP_RP2040W
    AsyncTCP_SSL
    ESPUI

monitor_filters = 
    esp32_exception_decoder
    colorize

; Release build: same as [env:esp32c6] plus OPENHALDEX_RELEASE, which forces
; every debug flag in include/OpenHaldexC6_defs.h off.
[env:esp32c6-release]
extends = env:esp32c6
build_flags = ${env:esp32c6.build_flags}
    -D OPENHALDEX_RELEASE

; Host-native test environment (no hardware). Compiles only the pure-function
; core (globals + Calculations) against the stub headers in test/native/stubs
; so the checksum and lock-target logic can be tested on the host.
[env:native]
platform = native
test_framework = unity
; Compile the filtered src/ files into the test binary so tests link against
; the real functions, not a copy.
test_build_src = yes
build_flags =
    -I test/native/stubs
    -std=gnu++17
build_src_filter =
    -<*>
    +<OpenHaldexC6_globals.cpp>
    +<OpenHaldexC6_Calculations.cpp>
